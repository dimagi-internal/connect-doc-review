<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect: Shared Docs Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f7f8fa; color: #1a1d23; line-height: 1.5; }
  header { background: #fff; border-bottom: 1px solid #e2e5ea; padding: 20px 32px; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
  header a { font-size: 0.8rem; color: #5c6bc0; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  main { max-width: 1080px; margin: 0 auto; padding: 32px 24px 64px; }
  .section { margin-bottom: 40px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .status-pill { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
  .pill-implementation  { background: #ede7f6; color: #4527a0; }
  .pill-tech-spec       { background: #e3f2fd; color: #0d47a1; }
  .pill-req-validation  { background: #e8f5e9; color: #1b5e20; }
  .pill-prioritized     { background: #fff8e1; color: #e65100; }
  .pill-defining        { background: #e8f4fd; color: #1565c0; }
  .count { font-size: 0.78rem; color: #8a92a0; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e5ea; border-radius: 8px; overflow: hidden; font-size: 0.875rem; }
  th { background: #f0f2f5; text-align: left; font-weight: 600; font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; color: #6b7280; padding: 9px 14px; border-bottom: 1px solid #e2e5ea; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .ticket-key { font-family: 'SFMono-Regular', 'Consolas', monospace; font-size: 0.75rem; color: #5c6bc0; text-decoration: none; white-space: nowrap; }
  .ticket-key:hover { text-decoration: underline; }
  .doc-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; color: #5c6bc0; text-decoration: none; }
  .doc-link:hover { text-decoration: underline; }
  .doc-icon { flex-shrink: 0; width: 14px; height: 14px; opacity: 0.65; }
  .doc-title.loading { color: #aaa; font-style: italic; }
  .doc-title.error { color: #999; font-style: italic; }

  /* Editable text cells */
  .editable {
    min-width: 0; cursor: text; border-radius: 4px;
    padding: 3px 6px; margin: -3px -6px; color: #1a1d23;
    font-size: 0.8rem; transition: background 0.1s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
  }
  .editable:hover { background: #f0f2f5; }
  .editable:focus { background: #fff; outline: 2px solid #5c6bc0; outline-offset: 0; white-space: normal; }
  .editable.empty { color: #bbb; font-style: italic; }
  .editable.empty:focus { color: #1a1d23; font-style: normal; }
  .saved-flash { animation: flash 0.4s ease; }
  @keyframes flash { 0%,100% { background: transparent; } 50% { background: #e8f5e9; } }

  /* Date picker */
  .date-input {
    border: none; background: transparent; font-family: inherit;
    font-size: 0.8rem; color: #1a1d23; cursor: pointer;
    padding: 3px 6px; margin: -3px -6px; border-radius: 4px;
    width: calc(100% + 12px); transition: background 0.1s;
  }
  .date-input:hover { background: #f0f2f5; }
  .date-input:focus { background: #fff; outline: 2px solid #5c6bc0; outline-offset: 0; }
  .date-input::-webkit-calendar-picker-indicator { opacity: 0.45; cursor: pointer; }
  .date-input.empty { color: #bbb; }

  /* Platform badges */
  .plat-cell { display: flex; gap: 4px; flex-wrap: wrap; }
  .plat { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.03em; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
  .plat-web { background: #e0f2fe; color: #0369a1; }
  .plat-mob { background: #fce7f3; color: #9d174d; }
  .plat-empty { color: #bbb; font-size: 0.8rem; }
  .pill-done-review { background: #e8f5e9; color: #2e7d32; }

  /* Tabs */
  header { justify-content: space-between; align-items: center; }
  .tab-nav { display: flex; gap: 2px; }
  .tab-btn { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 500; color: #6b7280; padding: 6px 14px; border-radius: 6px; transition: background 0.1s, color 0.1s; }
  .tab-btn:hover { background: #f0f2f5; color: #1a1d23; }
  .tab-btn.active { background: #ede7f6; color: #4527a0; }

  /* Docs to Review */
  .review-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .review-filter { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 0.8rem; color: #6b7280; }
  .filter-select { font-family: inherit; font-size: 0.8rem; border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 10px; color: #374151; background: #fff; cursor: pointer; }
  .filter-select:focus { outline: none; border-color: #5c6bc0; }

  /* Chip input (modal) */
  .chip-input-container { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 8px; cursor: text; min-height: 38px; background: #fff; transition: border 0.1s; }
  .chip-input-container:focus-within { border-color: #5c6bc0; }
  .chip-text-input { border: none; outline: none; font-family: inherit; font-size: 0.875rem; min-width: 100px; flex: 1; padding: 1px 0; }
  .reviewer-chip { display: inline-flex; align-items: center; gap: 3px; background: #ede7f6; color: #4527a0; font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
  .chip-remove { background: none; border: none; cursor: pointer; color: #7c4dff; font-size: 0.85rem; padding: 0; line-height: 1; }
  .chip-remove:hover { color: #4527a0; }

  /* Reviewer chips in table */
  .reviewer-chips { display: flex; flex-wrap: wrap; gap: 3px; }
  .reviewer-chip-sm { font-size: 0.68rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: #ede7f6; color: #4527a0; white-space: nowrap; }
  .btn-add { background: #5c6bc0; color: #fff; border: none; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 500; padding: 8px 16px; border-radius: 6px; transition: background 0.15s; }
  .btn-add:hover { background: #4527a0; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-backdrop.hidden { display: none; }
  .modal { background: #fff; border-radius: 10px; padding: 28px 32px; width: 520px; max-width: calc(100vw - 32px); box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 0.75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .form-row input, .form-row textarea { width: 100%; font-family: inherit; font-size: 0.875rem; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 10px; color: #1a1d23; transition: border 0.1s; resize: vertical; }
  .form-row input:focus, .form-row textarea:focus { outline: none; border-color: #5c6bc0; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn-cancel { background: #f0f2f5; border: none; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 500; padding: 8px 16px; border-radius: 6px; color: #374151; }
  .btn-cancel:hover { background: #e2e5ea; }
  .btn-save { background: #5c6bc0; color: #fff; border: none; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 500; padding: 8px 16px; border-radius: 6px; }
  .btn-save:hover { background: #4527a0; }

  /* Review table */
  .review-empty { color: #9ca3af; font-size: 0.875rem; text-align: center; padding: 48px 0; }
  #review-list table { width: 100%; }
  #review-list thead th { white-space: nowrap; }
  .review-title-cell a { color: #5c6bc0; text-decoration: none; font-weight: 500; }
  .review-title-cell a:hover { text-decoration: underline; }
  .review-summary-cell { color: #374151; font-size: 0.8rem; line-height: 1.5; max-width: 280px; }
  .btn-icon { background: none; border: 1px solid #e2e5ea; border-radius: 5px; cursor: pointer; padding: 3px 7px; font-size: 0.72rem; color: #6b7280; transition: background 0.1s; }
  .btn-icon:hover { background: #f0f2f5; }
  .btn-icon.delete:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
  .btn-icon.btn-complete:hover { background: #e8f5e9; border-color: #86efac; color: #15803d; }
  .review-actions { display: flex; gap: 4px; white-space: nowrap; }


  /* Auth */
  #auth-gate { position: fixed; inset: 0; background: #f7f8fa; display: flex; align-items: center; justify-content: center; z-index: 200; }
  #auth-gate.hidden { display: none; }
  .auth-card { background: #fff; border: 1px solid #e2e5ea; border-radius: 12px; padding: 40px 48px; text-align: center; max-width: 360px; width: 100%; }
  .auth-card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
  .auth-card p { font-size: 0.85rem; color: #6b7280; margin-bottom: 24px; }
  .btn-google { display: inline-flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px 20px; font-family: inherit; font-size: 0.875rem; font-weight: 500; cursor: pointer; color: #374151; transition: background 0.1s; }
  .btn-google:hover { background: #f9fafb; }
  .auth-error { font-size: 0.8rem; color: #dc2626; margin-top: 14px; min-height: 1.2em; }
  .user-badge { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #6b7280; }
  .user-badge img { width: 24px; height: 24px; border-radius: 50%; }
  .btn-signout { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 0.75rem; color: #9ca3af; padding: 0; }
  .btn-signout:hover { color: #374151; }

</style>
  <!-- Google Identity Services -->

<script>
const STORAGE_KEY = 'ccc-roadmap-fields';
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// ── Text editables (Blocking Reviewer) ───────────────────────────────────
document.querySelectorAll('.editable').forEach(el => {
  const key = el.dataset.key;
  const saved = loadData()[key];
  if (saved) { el.textContent = saved; el.classList.remove('empty'); }
  else { el.textContent = el.dataset.placeholder; }

  el.addEventListener('focus', () => { if (el.classList.contains('empty')) el.textContent = ''; });
  el.addEventListener('blur', () => {
    const val = el.textContent.trim();
    const data = loadData();
    if (val) {
      data[key] = val; el.textContent = val; el.classList.remove('empty');
      el.classList.add('saved-flash'); setTimeout(() => el.classList.remove('saved-flash'), 400);
    } else {
      delete data[key]; el.textContent = el.dataset.placeholder; el.classList.add('empty');
    }
    saveData(data);
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') {
      const saved = loadData()[key];
      el.textContent = saved || el.dataset.placeholder;
      if (!saved) el.classList.add('empty');
      el.blur();
    }
  });
});

// ── Date inputs ───────────────────────────────────────────────────────────
document.querySelectorAll('.date-input').forEach(el => {
  const key = el.dataset.key;
  const saved = loadData()[key];
  if (saved) { el.value = saved; el.classList.remove('empty'); }

  el.addEventListener('change', () => {
    const data = loadData();
    if (el.value) { data[key] = el.value; el.classList.remove('empty'); }
    else { delete data[key]; el.classList.add('empty'); }
    saveData(data);
  });
});

// ── Atlassian OAuth 2.0 (PKCE) ───────────────────────────────────────────
const ATLASSIAN_CLIENT_ID = '4pvBUKXizARwLAaGwfVKbsYMCadXBtxo';
const ATLASSIAN_SCOPE = 'read:jira-work';
const ATLASSIAN_REDIRECT_URI = 'https://dimagi-internal.github.io/connect-doc-review/';
const TOKEN_PROXY_URL = 'https://atlassianclientsecret.mrocheleau.workers.dev';

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function randomString(n) { const a = new Uint8Array(n); crypto.getRandomValues(a); return b64url(a); }
async function codeChallenge(verifier) {
  return b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
}

async function startAtlassianOAuth() {
  const verifier = randomString(48);
  const challenge = await codeChallenge(verifier);
  const state = randomString(16);
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('oauth_state', state);
  const params = new URLSearchParams({ audience:'api.atlassian.com', client_id:ATLASSIAN_CLIENT_ID,
    scope:ATLASSIAN_SCOPE, redirect_uri:ATLASSIAN_REDIRECT_URI, state,
    response_type:'code', prompt:'consent', code_challenge:challenge, code_challenge_method:'S256' });
  window.location.href = 'https://auth.atlassian.com/authorize?' + params;
}
window.startAtlassianOAuth = startAtlassianOAuth;

async function exchangeOAuthCode(code, state) {
  if (state !== sessionStorage.getItem('oauth_state')) throw new Error('OAuth state mismatch');
  const verifier = sessionStorage.getItem('pkce_verifier');
  const resp = await fetch(TOKEN_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, code_verifier: verifier }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(`Token exchange failed (${resp.status}): ${err.error_description || err.error || 'unknown'}`);
  }
  const { access_token, refresh_token, expires_in } = await resp.json();
  localStorage.setItem('atlassian_token', JSON.stringify({
    access_token, refresh_token, expires_at: Date.now() + expires_in * 1000,
  }));
  sessionStorage.removeItem('pkce_verifier');
  sessionStorage.removeItem('oauth_state');
  window.history.replaceState({}, '', window.location.pathname);
}

async function getValidToken() {
  let stored;
  try { stored = JSON.parse(localStorage.getItem('atlassian_token') || 'null'); } catch { return null; }
  if (!stored) return null;
  if (Date.now() < stored.expires_at - 60000) return stored.access_token;
  if (!stored.refresh_token) { localStorage.removeItem('atlassian_token'); return null; }
  try {
    const resp = await fetch('https://auth.atlassian.com/oauth/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'refresh_token', client_id:ATLASSIAN_CLIENT_ID, refresh_token:stored.refresh_token }),
    });
    if (!resp.ok) throw new Error();
    const { access_token, refresh_token, expires_in } = await resp.json();
    localStorage.setItem('atlassian_token', JSON.stringify({
      access_token, refresh_token: refresh_token || stored.refresh_token, expires_at: Date.now() + expires_in * 1000,
    }));
    return access_token;
  } catch { localStorage.removeItem('atlassian_token'); return null; }
}

async function getCloudId(token) {
  let cloudId = localStorage.getItem('atlassian_cloud_id');
  if (cloudId) return cloudId;
  const resp = await fetch('https://api.atlassian.com/oauth/token/accessible-resources',
    { headers:{ Authorization:`Bearer ${token}`, Accept:'application/json' } });
  if (!resp.ok) throw new Error('Could not fetch Atlassian sites');
  const sites = await resp.json();
  const site = sites.find(s => s.url.includes('dimagi')) || sites[0];
  if (!site) throw new Error('No accessible Atlassian site found');
  localStorage.setItem('atlassian_cloud_id', site.id);
  return site.id;
}

// ── Jira Design Docs sync ─────────────────────────────────────────────────
const JIRA_PROJECT = 'CCC';
const JIRA_CACHE_KEY = 'ccc-jira-issues-cache';
const JIRA_TTL_MS = 24 * 60 * 60 * 1000;

const STATUS_ORDER = ['Prioritized', 'Defining Requirements', 'Requirements Validation', 'Technical Specification', 'Implementation'];
const STATUS_PILL_CLASS = {
  'Prioritized': 'pill-prioritized',
  'Defining Requirements': 'pill-defining',
  'Requirements Validation': 'pill-req-validation',
  'Technical Specification': 'pill-tech-spec',
  'Implementation': 'pill-implementation',
};
const DOC_ICON_SVG = `<svg class="doc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

function updateRefreshLabel(fetchedAt) {
  const el = document.getElementById('doc-titles-last-refresh');
  if (!el) return;
  if (!fetchedAt) { el.textContent = ''; return; }
  const d = new Date(fetchedAt);
  el.textContent = `Last refreshed: ${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })} at ${d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })}`;
}

function extractDocUrl(val) {
  if (!val) return null;
  if (typeof val === 'string') { const m = val.match(/https?:\/\/[^\s"'<>]+/); return m ? m[0] : null; }
  if (Array.isArray(val)) { for (const v of val) { const u = extractDocUrl(v); if (u) return u; } return null; }
  if (typeof val === 'object') return val.url || val.value || extractDocUrl(Object.values(val)[0]) || null;
  return null;
}

function extractPlatforms(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.map(v => (typeof v === 'object' ? v.value || v.name : String(v))).filter(Boolean);
  if (typeof val === 'object') return [val.value || val.name].filter(Boolean);
  return [String(val)].filter(Boolean);
}

function renderSpecDocs({ issues, platformFieldId, documentsFieldId }) {
  const byStatus = {};
  issues.forEach(issue => {
    const status = issue.fields.status?.name || 'Other';
    (byStatus[status] = byStatus[status] || []).push(issue);
  });

  const orderedStatuses = [...STATUS_ORDER, ...Object.keys(byStatus).filter(s => !STATUS_ORDER.includes(s))];
  let html = '';

  orderedStatuses.forEach(status => {
    const group = byStatus[status];
    if (!group?.length) return;
    const pillClass = STATUS_PILL_CLASS[status] || 'pill-defining';

    const rows = group.map(issue => {
      const key = issue.key;
      const summary = issue.fields.summary || '';
      const assignee = issue.fields.assignee;
      const ownerName = assignee?.displayName || '';
      const ownerShort = ownerName.split(' ')[0];
      const platforms = extractPlatforms(platformFieldId ? issue.fields[platformFieldId] : null);
      const docUrl = extractDocUrl(documentsFieldId ? issue.fields[documentsFieldId] : null);

      const docHtml = docUrl
        ? `<a class="doc-link" href="${escHtml(docUrl)}" target="_blank" data-doc-url="${escHtml(docUrl)}">${DOC_ICON_SVG}<span class="doc-title loading">loading…</span></a>`
        : '<span style="color:#bbb">—</span>';

      const platHtml = platforms.length
        ? `<div class="plat-cell">${platforms.map(p => `<span class="plat ${p.toLowerCase().includes('web') ? 'plat-web' : 'plat-mob'}">${escHtml(p)}</span>`).join('')}</div>`
        : '<span class="plat-empty">—</span>';

      const ownerHtml = ownerName
        ? `<span class="owner" title="${escHtml(ownerName)}">${escHtml(ownerShort)}</span>`
        : '<span class="owner empty">—</span>';

      return `<tr>
        <td><a class="ticket-key" href="${JIRA_BASE}/browse/${escHtml(key)}" target="_blank">${escHtml(key)}</a></td>
        <td>${escHtml(summary)}</td>
        <td>${docHtml}</td>
        <td>${ownerHtml}</td>
        <td>${platHtml}</td>
      </tr>`;
    }).join('');

    html += `<div class="section">
      <div class="section-header">
        <span class="status-pill ${pillClass}">${escHtml(status)}</span>
        <span class="count">${group.length} ticket${group.length !== 1 ? 's' : ''}</span>
      </div>
      <table>
        <thead><tr><th style="width:90px">Ticket</th><th>Summary</th><th style="width:200px">Doc</th><th style="width:120px">Owner</th><th style="width:110px">Platform</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  document.getElementById('spec-docs-content').innerHTML = html || '<p class="review-empty">No tickets found in Jira.</p>';
  resolveRenderedDocTitles();
}

function resolveRenderedDocTitles() {
  const els = [...document.querySelectorAll('#spec-docs-content [data-doc-url]')];
  if (!els.length) return;
  const urls = [...new Set(els.map(el => el.dataset.docUrl))];
  const spansByUrl = {};
  els.forEach(el => {
    const url = el.dataset.docUrl;
    const span = el.querySelector('.doc-title');
    if (span) (spansByUrl[url] = spansByUrl[url] || []).push(span);
  });
  fetch('https://api.atlassian.com/object-resolver/resolve/batch', {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ resourceUrls: urls.map(url => ({ resourceUrl: url })) }),
  }).then(r => r.ok ? r.json() : Promise.reject()).then(results => {
    results.forEach((result, i) => {
      const title = result?.body?.data?.title || result?.title || null;
      (spansByUrl[urls[i]] || []).forEach(span => {
        span.classList.remove('loading');
        span.textContent = title || 'Open doc';
        if (!title) span.classList.add('error');
      });
    });
  }).catch(() => {
    Object.values(spansByUrl).flat().forEach(span => { span.classList.remove('loading'); span.textContent = 'Open doc'; });
  });
}

function showConnectPrompt() {
  document.getElementById('spec-docs-content').innerHTML =
    `<p class="review-empty">Connect your Atlassian account to load live Jira tickets.<br><br>
     <button class="btn-add" onclick="startAtlassianOAuth()" style="margin:0 auto;display:inline-block">Connect to Jira</button></p>`;
}

async function fetchAndRenderSpecDocs(force = false) {
  const btn = document.getElementById('btn-refresh-jira');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Refreshing…'; }

  if (!force) {
    try {
      const cached = JSON.parse(localStorage.getItem(JIRA_CACHE_KEY) || 'null');
      if (cached && Date.now() - cached.fetchedAt < JIRA_TTL_MS) {
        renderSpecDocs(cached);
        updateRefreshLabel(cached.fetchedAt);
        if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh from Jira'; }
        return;
      }
    } catch {}
  }

  const token = await getValidToken();
  if (!token) {
    showConnectPrompt();
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh from Jira'; }
    return;
  }

  try {
    // Always re-fetch cloud ID on a forced refresh in case it's stale
    if (force) localStorage.removeItem('atlassian_cloud_id');
    const cloudId = await getCloudId(token);
    const apiBase = `https://api.atlassian.com/ex/jira/${cloudId}/rest/api/3`;
    const headers = { Authorization: `Bearer ${token}`, Accept: 'application/json' };

    const fieldsResp = await fetch(`${apiBase}/field`, { headers });
    if (!fieldsResp.ok) throw new Error(`Field fetch failed (${fieldsResp.status})`);
    const allFields = await fieldsResp.json();
    const platformFieldId = allFields.find(f => f.custom && f.name.toLowerCase() === 'platform')?.id;
    const documentsFieldId = allFields.find(f => f.custom && f.name.toLowerCase() === 'documents')?.id;

    let allIssues = [], nextPageToken;
    while (true) {
      const body = { jql: `project = ${JIRA_PROJECT}`, maxResults: 50 };
      if (nextPageToken) body.nextPageToken = nextPageToken;
      const searchResp = await fetch(`${apiBase}/search/jql`, {
        method: 'POST',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!searchResp.ok) {
        const errBody = await searchResp.json().catch(() => ({}));
        throw new Error(`Jira search failed (${searchResp.status}): ${JSON.stringify(errBody).slice(0, 200)}`);
      }
      const data = await searchResp.json();
      allIssues = allIssues.concat(data.issues);
      if (!data.nextPageToken || data.issues.length < 100) break;
      nextPageToken = data.nextPageToken;
    }

    const fetchedAt = Date.now();
    const cacheData = { issues: allIssues, platformFieldId, documentsFieldId, fetchedAt };
    localStorage.setItem(JIRA_CACHE_KEY, JSON.stringify(cacheData));
    renderSpecDocs(cacheData);
    updateRefreshLabel(fetchedAt);
  } catch (err) {
    document.getElementById('spec-docs-content').innerHTML =
      `<p class="review-empty" style="color:#dc2626">Could not load Jira data: ${err.message}</p>`;
  }

  if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh from Jira'; }
}

document.getElementById('btn-refresh-jira').addEventListener('click', () => fetchAndRenderSpecDocs(true));

// Handle OAuth callback (code in URL) then load normally
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code'), state = params.get('state');
  if (code && state) {
    try {
      await exchangeOAuthCode(code, state);
    } catch (e) {
      console.error('OAuth error:', e);
      document.getElementById('spec-docs-content').innerHTML =
        `<p class="review-empty" style="color:#dc2626">Jira connection failed: ${e.message}<br><br>
         <button class="btn-add" onclick="startAtlassianOAuth()" style="margin:0 auto;display:inline-block">Try again</button></p>`;
      return;
    }
  }
  fetchAndRenderSpecDocs();
})();
</script>

<!-- Add/Edit modal -->
<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal" id="review-modal">
    <h2 id="modal-title">Add doc for review</h2>
    <div class="form-row">
      <label>Doc title</label>
      <input type="text" id="field-title" placeholder="e.g. Redesign spec — Opportunity Home">
    </div>
    <div class="form-row">
      <label>Doc URL (optional)</label>
      <input type="url" id="field-url" placeholder="https://docs.google.com/…">
    </div>
    <div class="form-row">
      <label>Due date</label>
      <input type="date" id="field-due">
    </div>
    <div class="form-row">
      <label>Requested reviewers</label>
      <div class="chip-input-container" id="reviewers-chip-container">
        <input class="chip-text-input" id="field-reviewers-input" placeholder="Type a name, press Enter or comma…">
      </div>
    </div>
    <div class="form-row">
      <label>Summary of request</label>
      <textarea id="field-summary" rows="3" placeholder="What do you need reviewed and why?"></textarea>
    </div>
    <div class="form-row">
      <label>Requester</label>
      <input type="text" id="field-requester" readonly style="background:#f0f2f5;color:#6b7280;cursor:default;">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
// ── Tab switching ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).style.display = '';
  });
});

// ── Docs to Review ────────────────────────────────────────────────────────
const REVIEW_KEY = 'ccc-docs-to-review';
function loadReviews() { try { return JSON.parse(localStorage.getItem(REVIEW_KEY) || '[]'); } catch { return []; } }
function saveReviews(items) { localStorage.setItem(REVIEW_KEY, JSON.stringify(items)); }

function makeTable(items, idxMap, showComplete) {
  if (!items.length) return '';
  const rows = items.map((item, j) => {
    const i = idxMap[j];
    const titleHtml = item.url
      ? `<a href="${escHtml(item.url)}" target="_blank">${escHtml(item.title)}</a>`
      : escHtml(item.title);
    const actions = showComplete
      ? `<button class="btn-icon" onclick="editReview(${i})">Edit</button>
         <button class="btn-icon btn-complete" onclick="markComplete(${i})" title="Mark as complete">✓</button>
         <button class="btn-icon delete" onclick="deleteReview(${i})">✕</button>`
      : `<button class="btn-icon" onclick="reopenReview(${i})" title="Move back to pending">↩</button>
         <button class="btn-icon delete" onclick="deleteReview(${i})">✕</button>`;
    return `<tr>
      <td class="review-title-cell">${titleHtml}</td>
      <td>${item.due ? escHtml(item.due) : '<span style="color:#bbb">—</span>'}</td>
      <td>${renderReviewerChips(item.reviewers)}</td>
      <td>${item.requester ? escHtml(item.requester) : '<span style="color:#bbb">—</span>'}</td>
      <td class="review-summary-cell">${item.summary ? escHtml(item.summary) : '<span style="color:#bbb">—</span>'}</td>
      <td><div class="review-actions">${actions}</div></td>
    </tr>`;
  }).join('');
  return `<table>
    <thead><tr>
      <th style="width:200px">Doc</th>
      <th style="width:110px">Due Date</th>
      <th style="width:150px">Reviewers</th>
      <th style="width:120px">Requester</th>
      <th>Summary</th>
      <th style="width:100px"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderReviews() {
  const items = loadReviews();
  const pending = [], pendingIdx = [], completed = [], completedIdx = [];
  items.forEach((item, i) => {
    if (item.completed) { completed.push(item); completedIdx.push(i); }
    else { pending.push(item); pendingIdx.push(i); }
  });

  // Populate filter dropdown with unique reviewers from all pending items
  const filterEl = document.getElementById('filter-reviewer');
  const currentFilter = filterEl.value;
  const allReviewers = [...new Set(items.flatMap(item => normalizeReviewers(item.reviewers)))].sort();
  filterEl.innerHTML = '<option value="">All reviewers</option>' +
    allReviewers.map(r => `<option value="${escHtml(r)}"${r === currentFilter ? ' selected' : ''}>${escHtml(r)}</option>`).join('');

  // Apply filter
  const filtered = currentFilter
    ? pending.filter((item, j) => normalizeReviewers(item.reviewers).includes(currentFilter))
    : pending;
  const filteredIdx = currentFilter
    ? pendingIdx.filter((_, j) => normalizeReviewers(pending[j].reviewers).includes(currentFilter))
    : pendingIdx;

  const list = document.getElementById('review-list');
  list.innerHTML = filtered.length
    ? `<div class="section-header" style="margin-bottom:12px"><span class="status-pill pill-defining">Docs under Review</span></div>` + makeTable(filtered, filteredIdx, true)
    : '<p class="review-empty">No pending docs — click "+ Add new" to get started.</p>';

  const compList = document.getElementById('completed-list');
  const compCount = document.getElementById('completed-count');
  compCount.textContent = completed.length ? `${completed.length} item${completed.length > 1 ? 's' : ''}` : '';
  compList.innerHTML = completed.length
    ? makeTable(completed, completedIdx, false)
    : '<p class="review-empty" style="padding:24px 0">No completed reviews yet.</p>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function normalizeReviewers(reviewers) {
  if (!reviewers) return [];
  if (Array.isArray(reviewers)) return reviewers;
  return reviewers.split(',').map(r => r.trim()).filter(Boolean);
}

const CHIP_PALETTES = [
  { bg: '#ede7f6', color: '#4527a0' },
  { bg: '#e3f2fd', color: '#0d47a1' },
  { bg: '#e8f5e9', color: '#1b5e20' },
  { bg: '#fff8e1', color: '#e65100' },
  { bg: '#fce4ec', color: '#880e4f' },
  { bg: '#e0f2f1', color: '#004d40' },
  { bg: '#f3e5f5', color: '#6a1b9a' },
  { bg: '#e8eaf6', color: '#1a237e' },
  { bg: '#fbe9e7', color: '#bf360c' },
  { bg: '#f1f8e9', color: '#33691e' },
];

function chipPalette(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (Math.imul(31, h) + name.charCodeAt(i)) | 0;
  return CHIP_PALETTES[Math.abs(h) % CHIP_PALETTES.length];
}

function chipStyle(name) {
  const { bg, color } = chipPalette(name);
  return `background:${bg};color:${color}`;
}

function renderReviewerChips(reviewers) {
  const names = normalizeReviewers(reviewers);
  if (!names.length) return '<span style="color:#bbb">—</span>';
  return `<div class="reviewer-chips">${names.map(n => `<span class="reviewer-chip-sm" style="${chipStyle(n)}">${escHtml(n)}</span>`).join('')}</div>`;
}

// ── Chip input state ──────────────────────────────────────────────────────
let currentChips = [];

function renderModalChips() {
  const container = document.getElementById('reviewers-chip-container');
  const input = document.getElementById('field-reviewers-input');
  container.querySelectorAll('.reviewer-chip').forEach(el => el.remove());
  currentChips.forEach((name, i) => {
    const chip = document.createElement('span');
    chip.className = 'reviewer-chip';
    chip.setAttribute('style', chipStyle(name));
    chip.innerHTML = `${escHtml(name)}<button class="chip-remove" type="button" aria-label="Remove" style="color:inherit;opacity:0.6">×</button>`;
    chip.querySelector('.chip-remove').addEventListener('click', () => {
      currentChips.splice(i, 1);
      renderModalChips();
    });
    container.insertBefore(chip, input);
  });
}

function addChip(name) {
  const trimmed = name.trim();
  if (trimmed && !currentChips.includes(trimmed)) {
    currentChips.push(trimmed);
    renderModalChips();
  }
}

document.getElementById('field-reviewers-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addChip(e.target.value);
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && currentChips.length) {
    currentChips.pop();
    renderModalChips();
  }
});
document.getElementById('field-reviewers-input').addEventListener('blur', e => {
  if (e.target.value.trim()) { addChip(e.target.value); e.target.value = ''; }
});
document.getElementById('reviewers-chip-container').addEventListener('click', () => {
  document.getElementById('field-reviewers-input').focus();
});

// Modal open/close
let editingIdx = null;

function openModal(idx = null) {
  editingIdx = idx;
  const items = loadReviews();
  const item = idx !== null ? items[idx] : {};
  document.getElementById('modal-title').textContent = idx !== null ? 'Edit doc' : 'Add doc for review';
  document.getElementById('field-title').value = item.title || '';
  document.getElementById('field-url').value = item.url || '';
  document.getElementById('field-due').value = item.due || '';
  document.getElementById('field-summary').value = item.summary || '';
  const currentUser = JSON.parse(sessionStorage.getItem('gsi_user') || '{}');
  document.getElementById('field-requester').value = currentUser.name || '';
  currentChips = normalizeReviewers(item.reviewers);
  renderModalChips();
  document.getElementById('field-reviewers-input').value = '';
  document.getElementById('modal-backdrop').classList.remove('hidden');
  document.getElementById('field-title').focus();
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.add('hidden');
  editingIdx = null;
}

document.getElementById('filter-reviewer').addEventListener('change', renderReviews);
document.getElementById('btn-add-review').addEventListener('click', () => openModal());
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('modal-save').addEventListener('click', () => {
  const title = document.getElementById('field-title').value.trim();
  if (!title) { document.getElementById('field-title').focus(); return; }
  const item = {
    title,
    url: document.getElementById('field-url').value.trim(),
    due: document.getElementById('field-due').value,
    reviewers: [...currentChips],
    summary: document.getElementById('field-summary').value.trim(),
    requester: document.getElementById('field-requester').value.trim(),
  };
  const items = loadReviews();
  if (editingIdx !== null) items[editingIdx] = item;
  else items.push(item);
  saveReviews(items);
  renderReviews();
  closeModal();
});

window.editReview = function(i) { openModal(i); };
window.markComplete = function(i) {
  const items = loadReviews();
  items[i].completed = true;
  saveReviews(items);
  renderReviews();
};
window.reopenReview = function(i) {
  const items = loadReviews();
  delete items[i].completed;
  saveReviews(items);
  renderReviews();
};
window.deleteReview = function(i) {
  if (!confirm('Remove this doc?')) return;
  const items = loadReviews();
  items.splice(i, 1);
  saveReviews(items);
  renderReviews();
};

// Keyboard shortcut: Escape closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderReviews();
</script>


<script>
// ── Google Identity Services auth ────────────────────────────────────────
const CLIENT_ID = '331565768762-qcn4e21tp2u10nqt7ns2e1jhjla5sv2p.apps.googleusercontent.com';
const ALLOWED_DOMAIN = 'dimagi.com';

const gate      = document.getElementById('auth-gate');
const authError = document.getElementById('auth-error');
const userBadge = document.getElementById('user-badge');
const userName  = document.getElementById('user-name');
const userPhoto = document.getElementById('user-photo');

function parseJwt(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch { return null; }
}

function signIn(response) {
  const payload = parseJwt(response.credential);
  if (!payload || !payload.email.endsWith('@' + ALLOWED_DOMAIN)) {
    authError.textContent = 'Access is restricted to @dimagi.com accounts.';
    return;
  }
  // Store session
  sessionStorage.setItem('gsi_user', JSON.stringify({
    email: payload.email,
    name: payload.name,
    picture: payload.picture,
  }));
  showApp(payload);
}

function showApp(user) {
  gate.classList.add('hidden');
  userBadge.style.display = 'flex';
  userName.textContent = user.name || user.email;
  if (user.picture) { userPhoto.src = user.picture; userPhoto.style.display = ''; }
  else { userPhoto.style.display = 'none'; }
}

function signOut() {
  sessionStorage.removeItem('gsi_user');
  userBadge.style.display = 'none';
  gate.classList.remove('hidden');
  google.accounts.id.revoke(userName.textContent, () => {});
}

document.getElementById('btn-signout').addEventListener('click', signOut);

// Replace the sign-in button with GSI One Tap + rendered button
document.getElementById('btn-google-signin').addEventListener('click', () => {
  google.accounts.id.prompt();
});

window.addEventListener('load', () => {
  // Check for existing session
  const stored = sessionStorage.getItem('gsi_user');
  if (stored) { showApp(JSON.parse(stored)); return; }

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: signIn,
    hosted_domain: ALLOWED_DOMAIN,
  });

  // Render button inside the existing btn-google-signin
  google.accounts.id.renderButton(
    document.getElementById('btn-google-signin'),
    { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular' }
  );

  // Also show One Tap prompt
  google.accounts.id.prompt();
});
</script>
